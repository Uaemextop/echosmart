<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E676;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="signalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#0A1A0F"/>
  <circle cx="60" cy="60" r="55" fill="none" stroke="#00E676" stroke-width="1" opacity="0.3"/>
  <!-- Signal arcs -->
  <path d="M 60 22 Q 78 12 92 28" stroke="url(#signalGrad)" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 56 30 Q 78 18 95 38" stroke="url(#signalGrad)" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 52 38 Q 78 24 97 48" stroke="url(#signalGrad)" stroke-width="2" fill="none" opacity="0.8"/>
  <!-- Smart leaf -->
  <path d="M 25 95 Q 25 40 60 25 Q 78 18 88 38 Q 92 52 78 60 Q 65 66 55 80 Q 50 88 45 95 Z" fill="url(#leafGrad)" />
  <!-- Circuit veins -->
  <path d="M 45 95 Q 50 68 65 53" stroke="#0A1A0F" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 52 73 L 65 65" stroke="#0A1A0F" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Circuit dots -->
  <circle cx="65" cy="53" r="3" fill="#0A1A0F" opacity="0.6"/>
  <circle cx="65" cy="65" r="2" fill="#0A1A0F" opacity="0.5"/>
</svg>
