<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Clock face -->
  <circle cx="24" cy="24" r="18" stroke="#78909C" stroke-width="2"/>
  <!-- Hour markers -->
  <line x1="24" y1="8" x2="24" y2="11" stroke="#78909C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="37" x2="24" y2="40" stroke="#78909C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="24" x2="11" y2="24" stroke="#78909C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="37" y1="24" x2="40" y2="24" stroke="#78909C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Hour hand -->
  <line x1="24" y1="24" x2="24" y2="15" stroke="#78909C" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="24" y1="24" x2="33" y2="18" stroke="#78909C" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="24" cy="24" r="2" fill="#78909C"/>
</svg>
