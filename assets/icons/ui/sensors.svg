<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Chip body -->
  <rect x="12" y="12" width="24" height="24" rx="3" stroke="#00BCD4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Inner circuit square -->
  <rect x="18" y="18" width="12" height="12" rx="1.5" stroke="#00BCD4" stroke-width="1.5" opacity="0.5"/>
  <circle cx="24" cy="24" r="2" fill="#00BCD4" opacity="0.6"/>
  <!-- Pins - top -->
  <line x1="18" y1="12" x2="18" y2="6" stroke="#00BCD4" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="12" x2="24" y2="6" stroke="#00BCD4" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="12" x2="30" y2="6" stroke="#00BCD4" stroke-width="2" stroke-linecap="round"/>
  <!-- Pins - bottom -->
  <line x1="18" y1="36" x2="18" y2="42" stroke="#00BCD4" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="36" x2="24" y2="42" stroke="#00BCD4" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="36" x2="30" y2="42" stroke="#00BCD4" stroke-width="2" stroke-linecap="round"/>
  <!-- Pins - left -->
  <line x1="12" y1="18" x2="6" y2="18" stroke="#00BCD4" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="24" x2="6" y2="24" stroke="#00BCD4" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="30" x2="6" y2="30" stroke="#00BCD4" stroke-width="2" stroke-linecap="round"/>
  <!-- Pins - right -->
  <line x1="36" y1="18" x2="42" y2="18" stroke="#00BCD4" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="24" x2="42" y2="24" stroke="#00BCD4" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="30" x2="42" y2="30" stroke="#00BCD4" stroke-width="2" stroke-linecap="round"/>
</svg>
