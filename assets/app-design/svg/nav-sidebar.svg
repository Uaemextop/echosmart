  <rect x="16" y="120" width="28" height="28" rx="6" fill="#111111"/>
  <rect x="16" y="160" width="28" height="28" rx="6" fill="#111111"/>
  <rect x="16" y="200" width="28" height="28" rx="6" fill="#111111"/>
