<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <radialGradient id="warnGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9100"/>
      <stop offset="100%" stop-color="#FF9100" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Pulse glow -->
  <circle cx="12" cy="12" r="10" fill="url(#warnGlow)" opacity="0.2"/>
  <circle cx="12" cy="12" r="7.5" stroke="#FF9100" stroke-width="1" opacity="0.3">
    <animate attributeName="r" values="7.5;10;7.5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Dot -->
  <circle cx="12" cy="12" r="5" fill="#FF9100"/>
</svg>
