<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <style>
    text { font-family: -apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif; }
    .title { font-size: 24px; fill: #E0E0E0; font-weight: 700; }
    .subtitle { font-size: 14px; fill: #78909C; font-weight: 400; }
    .value { font-size: 36px; fill: #E0E0E0; font-weight: 700; }
    .label { font-size: 12px; fill: #78909C; font-weight: 500; }
    .small { font-size: 11px; fill: #546E7A; }
    .accent { fill: #00E676; }
    .nav-item { font-size: 13px; fill: #78909C; }
    .nav-active { font-size: 13px; fill: #00E676; }
  </style>
  <rect width="1920" height="1080" fill="#000000"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="240" height="1080" fill="#0A0A0A"/>
  <text x="30" y="45" font-size="20" fill="#00E676" font-weight="700" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">🌿 EchoSmart</text>
  <g transform="translate(0,80)"><circle cx="30" cy="22" r="8" stroke="#78909C" stroke-width="1.5" fill="none"/><text x="50" y="27" class="nav-item">Dashboard</text></g>
  <g transform="translate(0,124)"><circle cx="30" cy="22" r="8" stroke="#78909C" stroke-width="1.5" fill="none"/><text x="50" y="27" class="nav-item">Sensors</text></g>
  <g transform="translate(0,168)"><circle cx="30" cy="22" r="8" stroke="#78909C" stroke-width="1.5" fill="none"/><text x="50" y="27" class="nav-item">Alerts</text></g>
  <rect x="0" y="212" width="240" height="44" fill="#111111"/>
  <rect x="0" y="212" width="3" height="44" fill="#00E676"/>
  <circle cx="30" cy="234" r="8" stroke="#00E676" stroke-width="1.5" fill="none"/>
  <text x="50" y="239" class="nav-active">Map</text>
  <g transform="translate(0,266)"><circle cx="30" cy="22" r="8" stroke="#78909C" stroke-width="1.5" fill="none"/><text x="50" y="27" class="nav-item">Reports</text></g>
  <g transform="translate(0,310)"><circle cx="30" cy="22" r="8" stroke="#78909C" stroke-width="1.5" fill="none"/><text x="50" y="27" class="nav-item">Settings</text></g>
  <g transform="translate(0,354)"><circle cx="30" cy="22" r="8" stroke="#78909C" stroke-width="1.5" fill="none"/><text x="50" y="27" class="nav-item">Users</text></g>

  <!-- Header -->
  <rect x="240" y="0" width="1680" height="64" fill="#0A0A0A"/>
  <text x="280" y="40" class="title">Greenhouse Map</text>

  <!-- Floor Plan -->
  <g transform="translate(280, 84)">
    <rect x="0" y="0" width="1240" height="900" rx="12" fill="#1A1A1A" stroke="#1E1E1E" stroke-width="1"/>

    <!-- Heatmap subtle zones -->
    <rect x="40" y="40" width="380" height="380" rx="8" fill="#FF5252" opacity="0.04"/>
    <rect x="440" y="40" width="380" height="380" rx="8" fill="#42A5F5" opacity="0.04"/>
    <rect x="40" y="460" width="780" height="380" rx="8" fill="#00E676" opacity="0.04"/>

    <!-- Zone A -->
    <rect x="40" y="40" width="380" height="380" rx="8" fill="none" stroke="#546E7A" stroke-width="1" stroke-dasharray="8,4"/>
    <text x="60" y="70" font-size="14" fill="#78909C" font-weight="600" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Zone A</text>
    <!-- Sensor dots Zone A -->
    <circle cx="130" cy="150" r="8" fill="#FF5252"/>
    <circle cx="260" cy="200" r="8" fill="#42A5F5"/>
    <circle cx="180" cy="300" r="8" fill="#FFD54F"/>
    <circle cx="340" cy="120" r="8" fill="#78909C"/>

    <!-- Zone B -->
    <rect x="440" y="40" width="380" height="380" rx="8" fill="none" stroke="#546E7A" stroke-width="1" stroke-dasharray="8,4"/>
    <text x="460" y="70" font-size="14" fill="#78909C" font-weight="600" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Zone B</text>
    <!-- Sensor dots Zone B -->
    <circle cx="540" cy="160" r="8" fill="#FF5252"/>
    <circle cx="670" cy="220" r="8" fill="#8D6E63"/>
    <circle cx="590" cy="320" r="8" fill="#42A5F5"/>
    <circle cx="750" cy="140" r="8" fill="#FFD54F"/>

    <!-- Zone C -->
    <rect x="40" y="460" width="780" height="380" rx="8" fill="none" stroke="#546E7A" stroke-width="1" stroke-dasharray="8,4"/>
    <text x="60" y="490" font-size="14" fill="#78909C" font-weight="600" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Zone C</text>
    <!-- Sensor dots Zone C -->
    <circle cx="150" cy="580" r="8" fill="#FF5252"/>
    <circle cx="350" cy="640" r="8" fill="#42A5F5"/>
    <circle cx="550" cy="560" r="8" fill="#78909C"/>
    <circle cx="700" cy="700" r="8" fill="#8D6E63"/>

    <!-- Bottom bar -->
    <rect x="0" y="860" width="1240" height="40" rx="0" fill="#0A0A0A"/>
    <circle cx="30" cy="880" r="4" fill="#00E676"/>
    <text x="42" y="884" class="small" fill="#00E676">12 Active</text>
    <text x="140" y="884" class="small">|</text>
    <text x="160" y="884" class="small">3 Zones</text>
    <text x="260" y="884" class="small">|</text>
    <text x="280" y="884" class="small">Updated 5s ago</text>
  </g>

  <!-- Right Panel -->
  <g transform="translate(1560, 84)">
    <rect x="0" y="0" width="320" height="500" rx="12" fill="#111111" stroke="#1E1E1E" stroke-width="1"/>
    <text x="24" y="38" font-size="16" fill="#E0E0E0" font-weight="600" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Zones</text>
    <line x1="24" y1="55" x2="296" y2="55" stroke="#1E1E1E" stroke-width="1"/>

    <!-- Zone A -->
    <rect x="16" y="70" width="288" height="60" rx="8" fill="#1A1A1A"/>
    <text x="32" y="95" font-size="14" fill="#E0E0E0" font-weight="500" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Zone A</text>
    <text x="32" y="115" class="small">4 sensors • Avg 24.5°C</text>
    <circle cx="276" cy="95" r="4" fill="#00E676"/>

    <!-- Zone B -->
    <rect x="16" y="145" width="288" height="60" rx="8" fill="#1A1A1A"/>
    <text x="32" y="170" font-size="14" fill="#E0E0E0" font-weight="500" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Zone B</text>
    <text x="32" y="190" class="small">4 sensors • Avg 22.8°C</text>
    <circle cx="276" cy="170" r="4" fill="#00E676"/>

    <!-- Zone C -->
    <rect x="16" y="220" width="288" height="60" rx="8" fill="#1A1A1A"/>
    <text x="32" y="245" font-size="14" fill="#E0E0E0" font-weight="500" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Zone C</text>
    <text x="32" y="265" class="small">4 sensors • Avg 23.1°C</text>
    <circle cx="276" cy="245" r="4" fill="#FFA726"/>

    <!-- Legend -->
    <text x="24" y="320" font-size="16" fill="#E0E0E0" font-weight="600" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Legend</text>
    <line x1="24" y1="335" x2="296" y2="335" stroke="#1E1E1E" stroke-width="1"/>
    <circle cx="36" cy="360" r="5" fill="#FF5252"/>
    <text x="52" y="364" class="label">Temperature</text>
    <circle cx="36" cy="385" r="5" fill="#42A5F5"/>
    <text x="52" y="389" class="label">Humidity</text>
    <circle cx="36" cy="410" r="5" fill="#FFD54F"/>
    <text x="52" y="414" class="label">Light</text>
    <circle cx="36" cy="435" r="5" fill="#78909C"/>
    <text x="52" y="439" class="label">CO₂</text>
    <circle cx="36" cy="460" r="5" fill="#8D6E63"/>
    <text x="52" y="464" class="label">Soil Moisture</text>
  </g>
</svg>
