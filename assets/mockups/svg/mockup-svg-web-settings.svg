<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <style>
    text { font-family: -apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif; }
    .title { font-size: 24px; fill: #E0E0E0; font-weight: 700; }
    .subtitle { font-size: 14px; fill: #78909C; font-weight: 400; }
    .value { font-size: 36px; fill: #E0E0E0; font-weight: 700; }
    .label { font-size: 12px; fill: #78909C; font-weight: 500; }
    .small { font-size: 11px; fill: #546E7A; }
    .accent { fill: #00E676; }
    .nav-item { font-size: 13px; fill: #78909C; }
    .nav-active { font-size: 13px; fill: #00E676; }
  </style>
  <rect width="1920" height="1080" fill="#000000"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="240" height="1080" fill="#0A0A0A"/>
  <text x="30" y="45" font-size="20" fill="#00E676" font-weight="700" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">🌿 EchoSmart</text>
  <g transform="translate(0,80)"><circle cx="30" cy="22" r="8" stroke="#78909C" stroke-width="1.5" fill="none"/><text x="50" y="27" class="nav-item">Dashboard</text></g>
  <g transform="translate(0,124)"><circle cx="30" cy="22" r="8" stroke="#78909C" stroke-width="1.5" fill="none"/><text x="50" y="27" class="nav-item">Sensors</text></g>
  <g transform="translate(0,168)"><circle cx="30" cy="22" r="8" stroke="#78909C" stroke-width="1.5" fill="none"/><text x="50" y="27" class="nav-item">Alerts</text></g>
  <g transform="translate(0,212)"><circle cx="30" cy="22" r="8" stroke="#78909C" stroke-width="1.5" fill="none"/><text x="50" y="27" class="nav-item">Map</text></g>
  <g transform="translate(0,256)"><circle cx="30" cy="22" r="8" stroke="#78909C" stroke-width="1.5" fill="none"/><text x="50" y="27" class="nav-item">Reports</text></g>
  <rect x="0" y="300" width="240" height="44" fill="#111111"/>
  <rect x="0" y="300" width="3" height="44" fill="#00E676"/>
  <circle cx="30" cy="322" r="8" stroke="#00E676" stroke-width="1.5" fill="none"/>
  <text x="50" y="327" class="nav-active">Settings</text>
  <g transform="translate(0,354)"><circle cx="30" cy="22" r="8" stroke="#78909C" stroke-width="1.5" fill="none"/><text x="50" y="27" class="nav-item">Users</text></g>

  <!-- Header -->
  <rect x="240" y="0" width="1680" height="64" fill="#0A0A0A"/>
  <text x="280" y="40" class="title">Settings</text>

  <!-- Settings Left Nav -->
  <g transform="translate(280, 90)">
    <rect x="0" y="0" width="260" height="440" rx="12" fill="#111111" stroke="#1E1E1E" stroke-width="1"/>
    <rect x="0" y="12" width="260" height="44" fill="#1A1A1A" rx="0"/>
    <rect x="0" y="12" width="3" height="44" fill="#00E676"/>
    <text x="24" y="40" font-size="14" fill="#00E676" font-weight="500" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">General</text>
    <text x="24" y="86" font-size="14" fill="#78909C" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Notifications</text>
    <text x="24" y="126" font-size="14" fill="#78909C" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Security</text>
    <text x="24" y="166" font-size="14" fill="#78909C" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">API Keys</text>
    <text x="24" y="206" font-size="14" fill="#78909C" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Integrations</text>
  </g>

  <!-- Settings Form -->
  <g transform="translate(580, 90)">
    <rect x="0" y="0" width="900" height="800" rx="12" fill="#111111" stroke="#1E1E1E" stroke-width="1"/>
    <text x="40" y="48" font-size="20" fill="#E0E0E0" font-weight="700" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">General Settings</text>
    <text x="40" y="72" class="subtitle">Configure your organization preferences</text>

    <!-- Organization Name -->
    <text x="40" y="120" class="label">Organization Name</text>
    <rect x="40" y="130" width="500" height="44" rx="8" fill="#1A1A1A" stroke="#1E1E1E" stroke-width="1"/>
    <text x="56" y="157" font-size="14" fill="#E0E0E0" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">EchoSmart Farm</text>

    <!-- Timezone -->
    <text x="40" y="210" class="label">Timezone</text>
    <rect x="40" y="220" width="500" height="44" rx="8" fill="#1A1A1A" stroke="#1E1E1E" stroke-width="1"/>
    <text x="56" y="247" font-size="14" fill="#E0E0E0" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">America/Mexico_City (UTC-6)</text>
    <text x="500" y="247" class="small">▾</text>

    <!-- Language -->
    <text x="40" y="300" class="label">Language</text>
    <rect x="40" y="310" width="500" height="44" rx="8" fill="#1A1A1A" stroke="#1E1E1E" stroke-width="1"/>
    <text x="56" y="337" font-size="14" fill="#E0E0E0" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">English (US)</text>
    <text x="500" y="337" class="small">▾</text>

    <!-- Unit System -->
    <text x="40" y="390" class="label">Temperature Unit</text>
    <g transform="translate(40, 400)">
      <rect x="0" y="0" width="120" height="36" rx="8" fill="#00E676"/>
      <text x="35" y="23" font-size="13" fill="#000000" font-weight="600" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Celsius</text>
      <rect x="130" y="0" width="120" height="36" rx="8" fill="#1A1A1A" stroke="#1E1E1E" stroke-width="1"/>
      <text x="148" y="23" font-size="13" fill="#78909C" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Fahrenheit</text>
    </g>

    <!-- Data Refresh -->
    <text x="40" y="480" class="label">Data Refresh Rate</text>
    <rect x="40" y="490" width="500" height="44" rx="8" fill="#1A1A1A" stroke="#1E1E1E" stroke-width="1"/>
    <text x="56" y="517" font-size="14" fill="#E0E0E0" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">5 seconds</text>
    <text x="500" y="517" class="small">▾</text>

    <!-- Dark Mode Toggle -->
    <text x="40" y="570" class="label">Dark Mode</text>
    <g transform="translate(40, 580)">
      <rect x="0" y="0" width="48" height="26" rx="13" fill="#00E676"/>
      <circle cx="34" cy="13" r="10" fill="#FFFFFF"/>
    </g>
    <text x="100" y="597" class="small">Enabled</text>

    <!-- Save Button -->
    <rect x="40" y="660" width="180" height="48" rx="10" fill="#00E676"/>
    <text x="68" y="690" font-size="15" fill="#000000" font-weight="600" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Save Changes</text>
  </g>
</svg>
