<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <style>
    text { font-family: -apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif; }
    .title { font-size: 24px; fill: #E0E0E0; font-weight: 700; }
    .subtitle { font-size: 14px; fill: #78909C; font-weight: 400; }
    .value { font-size: 36px; fill: #E0E0E0; font-weight: 700; }
    .label { font-size: 12px; fill: #78909C; font-weight: 500; }
    .small { font-size: 11px; fill: #546E7A; }
    .accent { fill: #00E676; }
    .nav-item { font-size: 13px; fill: #78909C; }
    .nav-active { font-size: 13px; fill: #00E676; }
  </style>
  <rect width="1920" height="1080" fill="#000000"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="240" height="1080" fill="#0A0A0A"/>
  <text x="30" y="45" font-size="20" fill="#00E676" font-weight="700" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">🌿 EchoSmart</text>
  <g transform="translate(0,80)">
    <circle cx="30" cy="22" r="8" stroke="#78909C" stroke-width="1.5" fill="none"/>
    <text x="50" y="27" class="nav-item">Dashboard</text>
  </g>
  <g transform="translate(0,124)">
    <circle cx="30" cy="22" r="8" stroke="#78909C" stroke-width="1.5" fill="none"/>
    <text x="50" y="27" class="nav-item">Sensors</text>
  </g>
  <rect x="0" y="168" width="240" height="44" fill="#111111"/>
  <rect x="0" y="168" width="3" height="44" fill="#00E676"/>
  <circle cx="30" cy="190" r="8" stroke="#00E676" stroke-width="1.5" fill="none"/>
  <text x="50" y="195" class="nav-active">Alerts</text>
  <g transform="translate(0,222)">
    <circle cx="30" cy="22" r="8" stroke="#78909C" stroke-width="1.5" fill="none"/>
    <text x="50" y="27" class="nav-item">Map</text>
  </g>
  <g transform="translate(0,266)">
    <circle cx="30" cy="22" r="8" stroke="#78909C" stroke-width="1.5" fill="none"/>
    <text x="50" y="27" class="nav-item">Reports</text>
  </g>
  <g transform="translate(0,310)">
    <circle cx="30" cy="22" r="8" stroke="#78909C" stroke-width="1.5" fill="none"/>
    <text x="50" y="27" class="nav-item">Settings</text>
  </g>
  <g transform="translate(0,354)">
    <circle cx="30" cy="22" r="8" stroke="#78909C" stroke-width="1.5" fill="none"/>
    <text x="50" y="27" class="nav-item">Users</text>
  </g>

  <!-- Header -->
  <rect x="240" y="0" width="1680" height="64" fill="#0A0A0A"/>
  <text x="280" y="40" class="title">Alerts</text>

  <!-- Tabs -->
  <g transform="translate(280, 84)">
    <text x="0" y="20" font-size="15" fill="#00E676" font-weight="600" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Active (5)</text>
    <line x1="0" y1="30" x2="80" y2="30" stroke="#00E676" stroke-width="2"/>
    <text x="120" y="20" font-size="15" fill="#78909C" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">History</text>
    <text x="210" y="20" font-size="15" fill="#78909C" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Rules</text>
  </g>

  <!-- Alert List -->
  <g transform="translate(280, 140)">
    <!-- Alert 1 - Critical -->
    <rect x="0" y="0" width="1200" height="90" rx="12" fill="#111111" stroke="#1E1E1E" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="90" rx="2" fill="#FF5252"/>
    <circle cx="36" cy="35" r="14" fill="#FF5252" opacity="0.15"/>
    <circle cx="36" cy="35" r="6" fill="#FF5252"/>
    <text x="64" y="32" font-size="15" fill="#E0E0E0" font-weight="600" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Critical: Temperature Exceeded 35°C</text>
    <text x="64" y="52" class="small">Zone A — Sensor TH-01 reading dangerous temperature levels</text>
    <text x="1000" y="32" class="small">2 min ago</text>
    <rect x="900" y="18" width="80" height="24" rx="6" fill="#1A1A1A"/>
    <text x="912" y="35" class="label">TH-01</text>
    <rect x="1080" y="55" width="100" height="28" rx="6" fill="#1A1A1A" stroke="#1E1E1E" stroke-width="1"/>
    <text x="1092" y="74" class="label">Acknowledge</text>

    <!-- Alert 2 - Warning -->
    <rect x="0" y="105" width="1200" height="90" rx="12" fill="#111111" stroke="#1E1E1E" stroke-width="1"/>
    <rect x="0" y="105" width="4" height="90" rx="2" fill="#FFA726"/>
    <circle cx="36" cy="140" r="14" fill="#FFA726" opacity="0.15"/>
    <circle cx="36" cy="140" r="6" fill="#FFA726"/>
    <text x="64" y="137" font-size="15" fill="#E0E0E0" font-weight="600" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Warning: Humidity Below 40%</text>
    <text x="64" y="157" class="small">Zone B — Soil moisture dropping below safe threshold</text>
    <text x="1000" y="137" class="small">15 min ago</text>
    <rect x="900" y="123" width="80" height="24" rx="6" fill="#1A1A1A"/>
    <text x="912" y="140" class="label">HM-03</text>
    <rect x="1080" y="160" width="100" height="28" rx="6" fill="#1A1A1A" stroke="#1E1E1E" stroke-width="1"/>
    <text x="1092" y="179" class="label">Acknowledge</text>

    <!-- Alert 3 - Info -->
    <rect x="0" y="210" width="1200" height="90" rx="12" fill="#111111" stroke="#1E1E1E" stroke-width="1"/>
    <rect x="0" y="210" width="4" height="90" rx="2" fill="#42A5F5"/>
    <circle cx="36" cy="245" r="14" fill="#42A5F5" opacity="0.15"/>
    <circle cx="36" cy="245" r="6" fill="#42A5F5"/>
    <text x="64" y="242" font-size="15" fill="#E0E0E0" font-weight="600" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Info: Sensor TH-04 Reconnected</text>
    <text x="64" y="262" class="small">Zone C — Sensor back online after 12 minute outage</text>
    <text x="1000" y="242" class="small">32 min ago</text>
    <rect x="900" y="228" width="80" height="24" rx="6" fill="#1A1A1A"/>
    <text x="912" y="245" class="label">TH-04</text>

    <!-- Alert 4 - Critical -->
    <rect x="0" y="315" width="1200" height="90" rx="12" fill="#111111" stroke="#1E1E1E" stroke-width="1"/>
    <rect x="0" y="315" width="4" height="90" rx="2" fill="#FF5252"/>
    <circle cx="36" cy="350" r="14" fill="#FF5252" opacity="0.15"/>
    <circle cx="36" cy="350" r="6" fill="#FF5252"/>
    <text x="64" y="347" font-size="15" fill="#E0E0E0" font-weight="600" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Critical: CO₂ Levels Above 600 ppm</text>
    <text x="64" y="367" class="small">Zone A — Immediate ventilation recommended</text>
    <text x="1000" y="347" class="small">1 hour ago</text>
    <rect x="900" y="333" width="80" height="24" rx="6" fill="#1A1A1A"/>
    <text x="912" y="350" class="label">CO-02</text>
    <rect x="1080" y="370" width="100" height="28" rx="6" fill="#1A1A1A" stroke="#1E1E1E" stroke-width="1"/>
    <text x="1092" y="389" class="label">Acknowledge</text>

    <!-- Alert 5 - Warning -->
    <rect x="0" y="420" width="1200" height="90" rx="12" fill="#111111" stroke="#1E1E1E" stroke-width="1"/>
    <rect x="0" y="420" width="4" height="90" rx="2" fill="#FFA726"/>
    <circle cx="36" cy="455" r="14" fill="#FFA726" opacity="0.15"/>
    <circle cx="36" cy="455" r="6" fill="#FFA726"/>
    <text x="64" y="452" font-size="15" fill="#E0E0E0" font-weight="600" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Warning: Light Intensity Low</text>
    <text x="64" y="472" class="small">Zone C — Below 200 lux for more than 2 hours</text>
    <text x="1000" y="452" class="small">2 hours ago</text>
    <rect x="900" y="438" width="80" height="24" rx="6" fill="#1A1A1A"/>
    <text x="912" y="455" class="label">LT-06</text>
    <rect x="1080" y="475" width="100" height="28" rx="6" fill="#1A1A1A" stroke="#1E1E1E" stroke-width="1"/>
    <text x="1092" y="494" class="label">Acknowledge</text>

    <!-- Alert 6 - Warning -->
    <rect x="0" y="525" width="1200" height="90" rx="12" fill="#111111" stroke="#1E1E1E" stroke-width="1"/>
    <rect x="0" y="525" width="4" height="90" rx="2" fill="#FFA726"/>
    <circle cx="36" cy="560" r="14" fill="#FFA726" opacity="0.15"/>
    <circle cx="36" cy="560" r="6" fill="#FFA726"/>
    <text x="64" y="557" font-size="15" fill="#E0E0E0" font-weight="600" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Warning: Gateway Beta High Latency</text>
    <text x="64" y="577" class="small">Network — Response time exceeding 500ms threshold</text>
    <text x="1000" y="557" class="small">3 hours ago</text>
    <rect x="900" y="543" width="80" height="24" rx="6" fill="#1A1A1A"/>
    <text x="912" y="560" class="label">GW-02</text>
  </g>

  <!-- Right Summary -->
  <g transform="translate(1520, 140)">
    <rect x="0" y="0" width="340" height="240" rx="12" fill="#111111" stroke="#1E1E1E" stroke-width="1"/>
    <text x="24" y="38" font-size="16" fill="#E0E0E0" font-weight="600" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Alert Summary</text>
    <line x1="24" y1="55" x2="316" y2="55" stroke="#1E1E1E" stroke-width="1"/>
    <circle cx="40" cy="85" r="6" fill="#FF5252"/>
    <text x="60" y="89" font-size="14" fill="#E0E0E0" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Critical</text>
    <text x="280" y="89" font-size="18" fill="#FF5252" font-weight="700" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">2</text>
    <circle cx="40" cy="125" r="6" fill="#FFA726"/>
    <text x="60" y="129" font-size="14" fill="#E0E0E0" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Warning</text>
    <text x="280" y="129" font-size="18" fill="#FFA726" font-weight="700" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">3</text>
    <circle cx="40" cy="165" r="6" fill="#42A5F5"/>
    <text x="60" y="169" font-size="14" fill="#E0E0E0" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">Info</text>
    <text x="280" y="169" font-size="18" fill="#42A5F5" font-weight="700" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">7</text>
    <line x1="24" y1="195" x2="316" y2="195" stroke="#1E1E1E" stroke-width="1"/>
    <text x="24" y="220" class="label">Total Active: 12</text>
  </g>
</svg>
