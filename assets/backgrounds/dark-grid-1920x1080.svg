<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0D2818"/>
      <stop offset="100%" style="stop-color:#060E09"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#00E676" opacity="0.04" stroke-width="1">
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <circle cx="960" cy="540" r="300" fill="none"/>
    <circle cx="960" cy="540" r="450" fill="none"/>
  </g>
  <!-- Constellation dots -->
  <circle cx="300" cy="200" r="2" fill="#00E676" opacity="0.3"/>
  <circle cx="1600" cy="800" r="2" fill="#00BCD4" opacity="0.3"/>
  <circle cx="1650" cy="250" r="1.5" fill="#00E676" opacity="0.2"/>
  <circle cx="250" cy="850" r="1.5" fill="#00BCD4" opacity="0.2"/>
</svg>
