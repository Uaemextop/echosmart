<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="sigGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00BCD4"/>
      <stop offset="100%" stop-color="#00BCD4" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- RPi Gateway device -->
  <rect x="50" y="110" width="80" height="55" rx="5" stroke="#00E676" stroke-width="2"/>
  <rect x="58" y="118" width="30" height="18" rx="2" stroke="#00E676" stroke-width="1.2" opacity="0.5"/>
  <circle cx="65" cy="150" r="2" fill="#00E676" opacity="0.8"/>
  <circle cx="73" cy="150" r="2" fill="#00BCD4" opacity="0.6"/>
  <!-- USB/Ethernet ports -->
  <rect x="100" y="120" width="12" height="8" rx="1" stroke="#00E676" stroke-width="1" opacity="0.4"/>
  <rect x="100" y="132" width="12" height="8" rx="1" stroke="#00E676" stroke-width="1" opacity="0.3"/>
  <!-- Signal waves going right -->
  <path d="M140 137a10 10 0 0 0 0-16" stroke="url(#sigGrad)" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M150 142a18 18 0 0 0 0-26" stroke="url(#sigGrad)" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <path d="M160 147a26 26 0 0 0 0-36" stroke="url(#sigGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Connection lines (dotted) -->
  <line x1="170" y1="105" x2="250" y2="80" stroke="#00BCD4" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <line x1="170" y1="130" x2="250" y2="140" stroke="#00BCD4" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <line x1="170" y1="155" x2="250" y2="200" stroke="#00BCD4" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <!-- Temperature sensor -->
  <g transform="translate(250, 60)">
    <rect x="0" y="0" width="40" height="40" rx="6" stroke="#FF5252" stroke-width="1.5"/>
    <path d="M17 8a3 3 0 0 1 6 0v14a5 5 0 1 1-6 0V8z" stroke="#FF5252" stroke-width="1.2" fill="none"/>
    <circle cx="20" cy="27" r="3" fill="#FF5252" opacity="0.5"/>
  </g>
  <!-- Humidity sensor -->
  <g transform="translate(270, 120)">
    <rect x="0" y="0" width="40" height="40" rx="6" stroke="#42A5F5" stroke-width="1.5"/>
    <path d="M20 8c0 0-8 10-8 16a8 8 0 0 0 16 0c0-6-8-16-8-16z" stroke="#42A5F5" stroke-width="1.2" fill="none"/>
  </g>
  <!-- Light sensor -->
  <g transform="translate(250, 180)">
    <rect x="0" y="0" width="40" height="40" rx="6" stroke="#FFD54F" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="6" stroke="#FFD54F" stroke-width="1.2"/>
    <line x1="20" y1="10" x2="20" y2="13" stroke="#FFD54F" stroke-width="1" stroke-linecap="round"/>
    <line x1="20" y1="27" x2="20" y2="30" stroke="#FFD54F" stroke-width="1" stroke-linecap="round"/>
    <line x1="10" y1="20" x2="13" y2="20" stroke="#FFD54F" stroke-width="1" stroke-linecap="round"/>
    <line x1="27" y1="20" x2="30" y2="20" stroke="#FFD54F" stroke-width="1" stroke-linecap="round"/>
  </g>
  <!-- Data pulses along connection lines -->
  <circle cx="210" cy="92" r="2" fill="#00BCD4" opacity="0.6"/>
  <circle cx="215" cy="135" r="2" fill="#00BCD4" opacity="0.5"/>
  <circle cx="208" cy="178" r="2" fill="#00BCD4" opacity="0.4"/>
</svg>
