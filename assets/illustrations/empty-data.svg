<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Y axis -->
  <line x1="80" y1="50" x2="80" y2="220" stroke="#333333" stroke-width="1.5" stroke-linecap="round"/>
  <!-- X axis -->
  <line x1="80" y1="220" x2="320" y2="220" stroke="#333333" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Grid lines horizontal -->
  <line x1="80" y1="100" x2="320" y2="100" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="80" y1="140" x2="320" y2="140" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="80" y1="180" x2="320" y2="180" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- Flat line (no data) -->
  <line x1="100" y1="200" x2="300" y2="200" stroke="#333333" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 4" opacity="0.5"/>
  <!-- Y-axis tick marks -->
  <line x1="75" y1="100" x2="80" y2="100" stroke="#333333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="75" y1="140" x2="80" y2="140" stroke="#333333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="75" y1="180" x2="80" y2="180" stroke="#333333" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Empty data indicator -->
  <circle cx="200" cy="140" r="20" stroke="#333333" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.3"/>
  <line x1="192" y1="140" x2="208" y2="140" stroke="#333333" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Placeholder text bars -->
  <rect x="160" y="250" width="80" height="4" rx="2" fill="#222222"/>
  <rect x="175" y="262" width="50" height="3" rx="1.5" fill="#1A1A1A"/>
</svg>
