<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — EchoSmart</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='6' fill='%2300E676'/></svg>">
</head>
<body>

<div class="dashboard-layout">
  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <a href="index.html" class="sidebar-brand">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="16" r="6" fill="#00E676"/>
        <path d="M16 4a12 12 0 0 1 12 12" stroke="#00E676" stroke-width="2" stroke-linecap="round" opacity=".7"/>
        <path d="M16 8a8 8 0 0 1 8 8" stroke="#00E676" stroke-width="2" stroke-linecap="round" opacity=".5"/>
        <path d="M16 24a12 12 0 0 1-12-12" stroke="#00E676" stroke-width="2" stroke-linecap="round" opacity=".3"/>
      </svg>
      EchoSmart
    </a>

    <nav class="sidebar-nav">
      <a href="dashboard.html" class="sidebar-link active">
        <span class="link-icon">📊</span> Dashboard
      </a>
      <a href="#" class="sidebar-link">
        <span class="link-icon">📡</span> Sensores
      </a>
      <a href="#" class="sidebar-link">
        <span class="link-icon">⚠️</span> Alertas
      </a>
      <a href="#" class="sidebar-link">
        <span class="link-icon">📋</span> Reportes
      </a>
      <a href="#" class="sidebar-link">
        <span class="link-icon">⚙️</span> Configuración
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="#" class="sidebar-link" id="logout-btn">
        <span class="link-icon">🚪</span> Cerrar Sesión
      </a>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="dashboard-main">
    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
        <h1 class="topbar-title">Dashboard</h1>
      </div>
      <div class="topbar-right">
        <span class="topbar-clock" id="dashboard-clock"></span>
        <button class="notification-btn" aria-label="Notificaciones">
          🔔
          <span class="badge">3</span>
        </button>
        <div class="user-info">
          <div class="user-avatar" id="user-avatar">U</div>
          <span id="user-name">Usuario</span>
        </div>
      </div>
    </header>

    <!-- Content -->
    <div class="dashboard-content">
      <!-- Stats row -->
      <div class="grid-4" id="stats-grid" style="margin-bottom:28px">
        <!-- Rendered by JS -->
      </div>

      <!-- Charts row -->
      <div class="grid-2" style="margin-bottom:28px">
        <div class="card chart-container">
          <h4>🌡️ Temperatura (24h)</h4>
          <div id="chart-temp"></div>
        </div>
        <div class="card chart-container">
          <h4>💧 Humedad (24h)</h4>
          <div id="chart-humidity"></div>
        </div>
      </div>

      <!-- Sensors grid -->
      <div class="section-header" style="text-align:left;margin-bottom:20px">
        <h3>Sensores Activos</h3>
      </div>
      <div class="grid-3" id="sensors-grid">
        <!-- Rendered by JS -->
      </div>
    </div>
  </main>
</div>

<script src="assets/js/app.js"></script>
<script src="assets/js/dashboard.js"></script>
</body>
</html>
