<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña — EchoSmart</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='6' fill='%2300E676'/></svg>">
</head>
<body>

<div class="auth-page">
  <div class="card auth-card">
    <a href="index.html" class="auth-logo">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="16" r="6" fill="#00E676"/>
        <path d="M16 4a12 12 0 0 1 12 12" stroke="#00E676" stroke-width="2" stroke-linecap="round" opacity=".7"/>
        <path d="M16 8a8 8 0 0 1 8 8" stroke="#00E676" stroke-width="2" stroke-linecap="round" opacity=".5"/>
        <path d="M16 24a12 12 0 0 1-12-12" stroke="#00E676" stroke-width="2" stroke-linecap="round" opacity=".3"/>
      </svg>
      EchoSmart
    </a>
    <p class="auth-subtitle">Recupera el acceso a tu cuenta</p>

    <form id="forgot-form" novalidate>
      <div class="input-group">
        <label for="forgot-email">Correo electrónico</label>
        <input type="email" id="forgot-email" name="email" class="input" placeholder="tu@correo.com" autocomplete="email">
      </div>

      <button type="submit" class="btn btn-primary btn-block">Enviar Enlace de Recuperación</button>
    </form>

    <div class="auth-links" style="justify-content:center;margin-top:16px">
      <a href="login.html">Volver a Iniciar Sesión</a>
    </div>
  </div>
</div>

<script src="assets/js/app.js"></script>
</body>
</html>
