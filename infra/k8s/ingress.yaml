apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: echosmart-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.echosmart.io
        - app.echosmart.io
      secretName: echosmart-tls
  rules:
    - host: api.echosmart.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echosmart-backend
                port:
                  number: 8000
    - host: app.echosmart.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echosmart-frontend
                port:
                  number: 80
