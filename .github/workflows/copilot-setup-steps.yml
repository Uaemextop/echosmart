name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # El job DEBE llamarse exactamente `copilot-setup-steps`
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # Opcional: mostrar información básica del runner
      - name: Show runner info
        run: |
          echo "OS:" $(uname -a)

      # Node.js instala también npm y npx
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain
        run: |
          node -v
          npm -v
          python --version || python3 --version
          uv --version || echo "uv not on PATH yet"

      # Paquetes MCP basados en Node.js / npx
      - name: Install MCP Node servers
        run: |
          npm install -g \
            @modelcontextprotocol/server-everything \
            @modelcontextprotocol/server-sequential-thinking \
            @modelcontextprotocol/server-memory \
            @modelcontextprotocol/server-filesystem \
            @playwright/mcp \
            @just-every/mcp-read-website-fast \
            chrome-devtools-mcp \
            next-devtools-mcp \
            mcp-echarts \
            mcp-mermaid \
            flyonui-mcp \
            gluestack-ui-mcp-server

      # Paquetes MCP basados en Python
      - name: Install MCP Python servers
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            mcp-server-fetch \
            mcp-server-git \
            baiyx-mcp-server-time
