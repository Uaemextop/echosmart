# ─────────────────────────────────────────────────────────────
# EchoSmart — Build .deb package for Raspberry Pi / Debian
# ─────────────────────────────────────────────────────────────
name: Build Gateway .deb

on:
  push:
    tags:
      - "v*"
    paths:
      - "gateway/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev debhelper dh-python python3-all

      - name: Build .deb package
        working-directory: gateway
        run: dpkg-buildpackage -us -uc -b

      - name: List built packages
        run: ls -lh echosmart-gateway_*.deb

      - name: Upload .deb as artifact
        uses: actions/upload-artifact@v4
        with:
          name: echosmart-gateway-deb
          path: echosmart-gateway_*.deb

      - name: Attach .deb to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: echosmart-gateway_*.deb
