name: Build .deb Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deb:
    name: Build echosmart-gateway .deb
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            debhelper \
            devscripts \
            dpkg-dev \
            build-essential \
            python3 \
            python3-venv \
            python3-pip

      - name: Set version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="1.0.0-dev.$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Building version: ${VERSION}"

      - name: Build .deb package
        run: |
          cd gateway
          dpkg-buildpackage -us -uc -b
          ls -la ../echosmart-gateway_*.deb || true

      - name: Verify package
        run: |
          DEB=$(ls gateway/../echosmart-gateway_*.deb 2>/dev/null | head -1)
          if [[ -n "${DEB}" ]]; then
            dpkg-deb --info "${DEB}"
            dpkg-deb --contents "${DEB}"
          fi

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: echosmart-gateway-deb-${{ steps.version.outputs.version }}
          path: echosmart-gateway_*.deb
          retention-days: 30
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: echosmart-gateway_*.deb
          generate_release_notes: true
          body: |
            ## EchoSmart Gateway v${{ steps.version.outputs.version }}

            ### Instalación en Raspberry Pi
            ```bash
            wget https://github.com/Uaemextop/echosmart/releases/download/${{ github.ref_name }}/echosmart-gateway_${{ steps.version.outputs.version }}_all.deb
            sudo dpkg -i echosmart-gateway_${{ steps.version.outputs.version }}_all.deb
            sudo echosmart-gateway-setup
            ```
