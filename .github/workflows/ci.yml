name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-backend:
    name: Lint Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff mypy
      - name: Run ruff (lint + format check)
        run: |
          cd backend
          ruff check src/ tests/
          ruff format --check src/ tests/

  lint-frontend:
    name: Lint Frontend (JS/TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run ESLint
        run: cd frontend && npm run lint --if-present

  lint-gateway:
    name: Lint Gateway (C++)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck
      - name: Run cppcheck
        run: cppcheck --enable=warning,style --error-exitcode=1 gateway/cpp/

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint-backend
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: echosmart_test
          POSTGRES_USER: echosmart
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        env:
          DATABASE_URL: postgresql://echosmart:test_password@localhost:5432/echosmart_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET_KEY: test-secret-key
        run: |
          cd backend
          pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: lint-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run tests
        run: cd frontend && npm run test:coverage

  gateway-tests:
    name: Gateway Tests (C++ --simulate)
    runs-on: ubuntu-latest
    needs: lint-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Compile C++ binaries
        run: |
          cd gateway/cpp
          g++ -O2 -std=c++17 -o /tmp/echosmart-sysinfo echosmart-sysinfo.cpp
          g++ -O2 -std=c++17 -o /tmp/echosmart-sensor-read echosmart-sensor-read.cpp

      - name: Test echosmart-sysinfo
        run: |
          /tmp/echosmart-sysinfo --simulate
          /tmp/echosmart-sysinfo --simulate | python3 -c "import sys,json; json.load(sys.stdin); print('JSON valid')"

      - name: Test echosmart-sensor-read (all sensors)
        run: |
          for sensor in ds18b20 dht22 bh1750 soil mhz19c; do
            echo "Testing sensor: $sensor"
            /tmp/echosmart-sensor-read $sensor --simulate
          done

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install security tools
        run: pip install bandit safety
      - name: Run bandit (Python security)
        run: bandit -r backend/src/ -ll --skip B101 || true  # Advisory: don't block CI until baseline is established
      - name: Check dependencies for vulnerabilities
        run: |
          cd backend
          safety check -r requirements.txt --output text || true  # Advisory: don't block CI until baseline is established
      - name: npm audit (frontend)
        run: |
          cd frontend
          npm audit --audit-level=high || true  # Advisory: don't block CI until baseline is established
