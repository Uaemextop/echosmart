name: Mobile Build

on:
  push:
    tags:
      - "mobile-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mobile:
    name: Build Mobile App (Android + iOS)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: |
          cd mobile
          npm ci

      - name: Run linter
        run: |
          cd mobile
          npm run lint --if-present

      - name: Run tests
        run: |
          cd mobile
          npm run test --if-present

      - name: Build Android (APK)
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd mobile
          eas build --platform android --profile production --non-interactive || echo "EAS build requires EXPO_TOKEN"

      - name: Build iOS (IPA)
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd mobile
          eas build --platform ios --profile production --non-interactive || echo "EAS build requires EXPO_TOKEN"
