<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 700">
  <style>
    text { font-family: 'Segoe UI', system-ui, sans-serif; }
    .title { font-size: 14px; font-weight: 700; fill: #E0E0E0; }
    .label { font-size: 10px; fill: #E0E0E0; font-weight: 600; }
    .detail { font-size: 8px; fill: #78909C; }
    .value { font-size: 16px; font-weight: 700; }
    .input { font-size: 10px; fill: #546E7A; }
  </style>
  <rect width="400" height="700" fill="#000000"/>
  <text x="200" y="16" text-anchor="middle" class="detail" fill="#546E7A">WIREFRAME — LOGIN</text>

  <!-- Phone frame -->
  <rect x="20" y="30" width="360" height="640" rx="30" fill="#000000" stroke="#1A1A1A" stroke-width="2"/>

  <!-- Status bar -->
  <rect x="20" y="30" width="360" height="30" rx="30" fill="#000000"/>
  <text x="200" y="50" text-anchor="middle" class="detail">9:41</text>

  <!-- Logo area -->
  <circle cx="200" cy="180" r="45" fill="#111111" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="200" y="175" text-anchor="middle" style="font-size:28px;" fill="#00E676">🌿</text>
  <text x="200" y="198" text-anchor="middle" class="detail" fill="#00E676">IoT</text>

  <!-- Brand name -->
  <text x="200" y="260" text-anchor="middle" style="font-size:28px;font-weight:700;" fill="#E0E0E0">Echo<tspan fill="#00E676">Smart</tspan></text>
  <text x="200" y="282" text-anchor="middle" class="detail" fill="#546E7A" style="letter-spacing:3px;">SMART GREENHOUSE IoT</text>

  <!-- Email input -->
  <rect x="55" y="330" width="290" height="48" rx="12" fill="#111111" stroke="rgba(0,230,118,0.15)" stroke-width="1"/>
  <text x="75" y="347" class="detail" fill="#00E676">Correo electrónico</text>
  <text x="75" y="366" class="input">usuario@echosmart.io</text>

  <!-- Password input -->
  <rect x="55" y="395" width="290" height="48" rx="12" fill="#111111" stroke="rgba(0,230,118,0.15)" stroke-width="1"/>
  <text x="75" y="412" class="detail" fill="#00E676">Contraseña</text>
  <text x="75" y="431" class="input">••••••••</text>
  <text x="325" y="425" text-anchor="end" class="detail" fill="#78909C">👁</text>

  <!-- Login button -->
  <rect x="55" y="470" width="290" height="48" rx="12" fill="#00E676"/>
  <text x="200" y="499" text-anchor="middle" style="font-size:14px;font-weight:600;fill:#000000;">Iniciar Sesión</text>

  <!-- Forgot password -->
  <text x="200" y="540" text-anchor="middle" class="detail" fill="#00BCD4">¿Olvidaste tu contraseña?</text>

  <!-- Divider -->
  <line x1="55" y1="570" x2="155" y2="570" stroke="#1A1A1A" stroke-width="1"/>
  <text x="200" y="574" text-anchor="middle" class="detail" fill="#546E7A">o</text>
  <line x1="245" y1="570" x2="345" y2="570" stroke="#1A1A1A" stroke-width="1"/>

  <!-- Biometric -->
  <rect x="55" y="595" width="290" height="40" rx="12" fill="#111111" stroke="rgba(0,230,118,0.15)" stroke-width="1"/>
  <text x="200" y="620" text-anchor="middle" class="detail" fill="#E0E0E0">🔐 Acceder con Face ID / Huella</text>

  <!-- Bottom -->
  <text x="200" y="655" text-anchor="middle" class="detail" fill="#546E7A">v1.0.0 · © 2024 EchoSmart</text>

  <!-- Wireframe annotation -->
  <text x="200" y="692" text-anchor="middle" class="detail" fill="#2E7D32">BOCETO — Pantalla Login (Web + Mobile)</text>
</svg>
