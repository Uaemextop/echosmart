<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <style>
    text { font-family: 'Segoe UI', system-ui, sans-serif; }
    .title { font-size: 14px; font-weight: 700; fill: #E0E0E0; }
    .label { font-size: 10px; fill: #E0E0E0; font-weight: 600; }
    .detail { font-size: 8px; fill: #78909C; }
  </style>
  <rect width="800" height="450" fill="#0A1A0F"/>
  <text x="400" y="16" text-anchor="middle" class="detail" fill="#546E7A">WIREFRAME — CENTRO DE ALERTAS</text>

  <!-- Sidebar mini -->
  <rect x="0" y="25" width="50" height="425" fill="#060E09"/>
  <text x="25" y="55" text-anchor="middle" class="detail" fill="#00E676">🌿</text>
  <text x="25" y="85" text-anchor="middle" class="detail">📊</text>
  <text x="25" y="110" text-anchor="middle" class="detail">🌡️</text>
  <text x="25" y="135" text-anchor="middle" class="detail">🗺️</text>
  <rect x="7" y="145" width="36" height="28" rx="6" fill="#1A2E1F"/>
  <text x="25" y="163" text-anchor="middle" class="detail" fill="#FF1744">⚠️</text>

  <!-- Header -->
  <rect x="50" y="25" width="750" height="40" fill="#0D2818"/>
  <text x="70" y="50" class="title" fill="#FF1744">⚠️ Centro de Alertas</text>
  <rect x="650" y="35" width="70" height="22" rx="6" fill="#1A2E1F"/>
  <text x="685" y="50" text-anchor="middle" class="detail">Filtrar</text>
  <rect x="730" y="35" width="50" height="22" rx="6" fill="#1A2E1F"/>
  <text x="755" y="50" text-anchor="middle" class="detail">Todas</text>

  <!-- Stats -->
  <rect x="65" y="75" width="115" height="55" rx="8" fill="#0D2818" stroke="rgba(255,23,68,0.2)" stroke-width="1"/>
  <text x="122" y="93" text-anchor="middle" class="detail" fill="#78909C">Críticas</text>
  <text x="122" y="118" text-anchor="middle" style="font-size:22px;font-weight:700;" fill="#FF1744">2</text>

  <rect x="190" y="75" width="115" height="55" rx="8" fill="#0D2818" stroke="rgba(255,145,0,0.2)" stroke-width="1"/>
  <text x="247" y="93" text-anchor="middle" class="detail" fill="#78909C">Altas</text>
  <text x="247" y="118" text-anchor="middle" style="font-size:22px;font-weight:700;" fill="#FF9100">5</text>

  <rect x="315" y="75" width="115" height="55" rx="8" fill="#0D2818" stroke="rgba(255,214,0,0.2)" stroke-width="1"/>
  <text x="372" y="93" text-anchor="middle" class="detail" fill="#78909C">Medias</text>
  <text x="372" y="118" text-anchor="middle" style="font-size:22px;font-weight:700;" fill="#FFD600">8</text>

  <rect x="440" y="75" width="115" height="55" rx="8" fill="#0D2818" stroke="rgba(68,138,255,0.2)" stroke-width="1"/>
  <text x="497" y="93" text-anchor="middle" class="detail" fill="#78909C">Bajas</text>
  <text x="497" y="118" text-anchor="middle" style="font-size:22px;font-weight:700;" fill="#448AFF">12</text>

  <rect x="565" y="75" width="115" height="55" rx="8" fill="#0D2818" stroke="rgba(0,230,118,0.2)" stroke-width="1"/>
  <text x="622" y="93" text-anchor="middle" class="detail" fill="#78909C">Resueltas hoy</text>
  <text x="622" y="118" text-anchor="middle" style="font-size:22px;font-weight:700;" fill="#00E676">15</text>

  <!-- Alert list -->
  <rect x="65" y="145" width="715" height="280" rx="10" fill="#0D2818" stroke="rgba(0,230,118,0.08)" stroke-width="1"/>
  <text x="85" y="170" class="label">Alertas Activas</text>

  <!-- Critical alert 1 -->
  <rect x="80" y="185" width="685" height="50" rx="8" fill="#1A0A0A" stroke="rgba(255,23,68,0.25)" stroke-width="1"/>
  <rect x="80" y="185" width="4" height="50" rx="2" fill="#FF1744"/>
  <circle cx="100" cy="210" r="6" fill="#FF1744"/>
  <text x="115" y="205" class="label">Temperatura Zona B: 32.5°C</text>
  <text x="115" y="220" class="detail" fill="#FF5252">CRÍTICA · Sensor DS18B20 · Umbral: > 28°C · Exceso: +4.5°C</text>
  <text x="115" y="230" class="detail">hace 2 min · Gateway: Invernadero Principal</text>
  <rect x="670" y="198" width="75" height="22" rx="6" fill="#00E676"/>
  <text x="707" y="213" text-anchor="middle" style="font-size:9px;font-weight:600;fill:#0A1A0F;">Confirmar</text>

  <!-- Critical alert 2 -->
  <rect x="80" y="245" width="685" height="50" rx="8" fill="#1A0A0A" stroke="rgba(255,23,68,0.25)" stroke-width="1"/>
  <rect x="80" y="245" width="4" height="50" rx="2" fill="#FF1744"/>
  <circle cx="100" cy="270" r="6" fill="#FF1744"/>
  <text x="115" y="265" class="label">Temperatura Zona C: 31.2°C</text>
  <text x="115" y="280" class="detail" fill="#FF5252">CRÍTICA · Sensor DS18B20 · Umbral: > 28°C · Exceso: +3.2°C</text>
  <text x="115" y="290" class="detail">hace 5 min · Gateway: Invernadero Principal</text>
  <rect x="670" y="258" width="75" height="22" rx="6" fill="#00E676"/>
  <text x="707" y="273" text-anchor="middle" style="font-size:9px;font-weight:600;fill:#0A1A0F;">Confirmar</text>

  <!-- High alert -->
  <rect x="80" y="305" width="685" height="50" rx="8" fill="#1A0D00" stroke="rgba(255,145,0,0.2)" stroke-width="1"/>
  <rect x="80" y="305" width="4" height="50" rx="2" fill="#FF9100"/>
  <circle cx="100" cy="330" r="6" fill="#FF9100"/>
  <text x="115" y="325" class="label">Humedad suelo Zona A: 45%</text>
  <text x="115" y="340" class="detail" fill="#FF9100">ALTA · Sensor SoilMoisture · Umbral: &lt; 50% · Déficit: -5%</text>
  <text x="115" y="350" class="detail">hace 15 min · Gateway: Invernadero Principal</text>
  <rect x="670" y="318" width="75" height="22" rx="6" fill="#1A2E1F"/>
  <text x="707" y="333" text-anchor="middle" class="detail" fill="#00E676">Confirmar</text>

  <!-- Medium alert -->
  <rect x="80" y="365" width="685" height="45" rx="8" fill="#0D2818" stroke="rgba(255,214,0,0.15)" stroke-width="1"/>
  <rect x="80" y="365" width="4" height="45" rx="2" fill="#FFD600"/>
  <circle cx="100" cy="387" r="6" fill="#FFD600"/>
  <text x="115" y="382" class="label">CO₂ Zona A: 950 ppm</text>
  <text x="115" y="397" class="detail" fill="#FFD600">MEDIA · Sensor MHZ-19C · Umbral: > 900 ppm</text>
  <rect x="670" y="376" width="75" height="22" rx="6" fill="#1A2E1F"/>
  <text x="707" y="391" text-anchor="middle" class="detail" fill="#78909C">Confirmar</text>

  <text x="400" y="442" text-anchor="middle" class="detail" fill="#2E7D32">BOCETO — Centro de Alertas · Severidades · Acknowledge · Filtros</text>
</svg>
