<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <style>
    text { font-family: 'Segoe UI', system-ui, sans-serif; }
    .title { font-size: 16px; font-weight: 700; fill: #E0E0E0; }
    .label { font-size: 11px; fill: #E0E0E0; font-weight: 600; }
    .detail { font-size: 9px; fill: #78909C; }
  </style>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#00E676"/></marker>
  </defs>
  <rect width="900" height="500" fill="#000000"/>
  <text x="450" y="30" text-anchor="middle" class="title">DIAGRAMA DE DESPLIEGUE — Infraestructura</text>

  <!-- Internet cloud -->
  <ellipse cx="450" cy="80" rx="120" ry="30" fill="none" stroke="#546E7A" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="84" text-anchor="middle" class="label" fill="#546E7A">☁️ Internet</text>

  <!-- CDN -->
  <rect x="30" y="130" width="160" height="60" rx="10" fill="#111111" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="110" y="155" text-anchor="middle" class="label" fill="#00E676">CDN (Vercel/Netlify)</text>
  <text x="110" y="173" text-anchor="middle" class="detail">Frontend estático</text>

  <!-- Load Balancer -->
  <rect x="370" y="130" width="160" height="60" rx="10" fill="#0D1A2E" stroke="rgba(0,188,212,0.2)" stroke-width="1"/>
  <text x="450" y="155" text-anchor="middle" class="label" fill="#00BCD4">Nginx / Ingress</text>
  <text x="450" y="173" text-anchor="middle" class="detail">Load Balancer + TLS</text>

  <!-- K8s Cluster -->
  <rect x="250" y="220" width="400" height="190" rx="12" fill="#0D1E30" stroke="rgba(0,188,212,0.15)" stroke-width="1"/>
  <text x="450" y="245" text-anchor="middle" class="label" fill="#00BCD4">Kubernetes Cluster</text>

  <!-- Backend pods -->
  <rect x="270" y="260" width="100" height="50" rx="6" fill="#0A1A2E" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="320" y="280" text-anchor="middle" class="detail" fill="#00E676">Backend Pod</text>
  <text x="320" y="296" text-anchor="middle" class="detail">FastAPI ×2</text>

  <rect x="380" y="260" width="100" height="50" rx="6" fill="#0A1A2E" stroke="rgba(255,143,0,0.2)" stroke-width="1"/>
  <text x="430" y="280" text-anchor="middle" class="detail" fill="#FF8F00">Worker Pod</text>
  <text x="430" y="296" text-anchor="middle" class="detail">Celery ×1</text>

  <rect x="490" y="260" width="140" height="50" rx="6" fill="#0A1A2E" stroke="rgba(0,188,212,0.2)" stroke-width="1"/>
  <text x="560" y="280" text-anchor="middle" class="detail" fill="#00BCD4">WebSocket Pod</text>
  <text x="560" y="296" text-anchor="middle" class="detail">Real-time ×1</text>

  <!-- DB StatefulSets -->
  <rect x="270" y="330" width="100" height="50" rx="6" fill="#0A1A2E" stroke="rgba(66,165,245,0.3)" stroke-width="1"/>
  <text x="320" y="350" text-anchor="middle" class="detail" fill="#42A5F5">PostgreSQL</text>
  <text x="320" y="366" text-anchor="middle" class="detail">StatefulSet</text>

  <rect x="380" y="330" width="100" height="50" rx="6" fill="#0A1A2E" stroke="rgba(171,71,188,0.3)" stroke-width="1"/>
  <text x="430" y="350" text-anchor="middle" class="detail" fill="#AB47BC">InfluxDB</text>
  <text x="430" y="366" text-anchor="middle" class="detail">StatefulSet</text>

  <rect x="490" y="330" width="80" height="50" rx="6" fill="#0A1A2E" stroke="rgba(255,82,82,0.3)" stroke-width="1"/>
  <text x="530" y="350" text-anchor="middle" class="detail" fill="#FF5252">Redis</text>
  <text x="530" y="366" text-anchor="middle" class="detail">Deploy</text>

  <rect x="580" y="330" width="50" height="50" rx="6" fill="#0A1A2E" stroke="rgba(0,188,212,0.2)" stroke-width="1"/>
  <text x="605" y="355" text-anchor="middle" class="detail" fill="#00BCD4">MQTT</text>

  <!-- Raspberry Pi -->
  <rect x="710" y="220" width="160" height="130" rx="12" fill="#1A1A0A" stroke="rgba(255,143,0,0.25)" stroke-width="1"/>
  <text x="790" y="245" text-anchor="middle" class="label" fill="#FF8F00">Raspberry Pi 4B</text>
  <text x="790" y="265" text-anchor="middle" class="detail">Gateway Edge</text>

  <rect x="725" y="280" width="130" height="22" rx="4" fill="#1A1A1A"/>
  <text x="790" y="296" text-anchor="middle" class="detail" fill="#00E676">EchoSmart Gateway</text>

  <rect x="725" y="310" width="60" height="22" rx="4" fill="#1A1A1A"/>
  <text x="755" y="326" text-anchor="middle" class="detail" fill="#FFD54F">SQLite</text>

  <rect x="795" y="310" width="60" height="22" rx="4" fill="#1A1A1A"/>
  <text x="825" y="326" text-anchor="middle" class="detail" fill="#00BCD4">MQTT</text>

  <!-- Mobile devices -->
  <rect x="30" y="260" width="160" height="100" rx="10" fill="#111111" stroke="rgba(0,230,118,0.15)" stroke-width="1"/>
  <text x="110" y="285" text-anchor="middle" class="label" fill="#00E676">Dispositivos Cliente</text>
  <text x="110" y="303" text-anchor="middle" class="detail">📱 Android (APK)</text>
  <text x="110" y="318" text-anchor="middle" class="detail">📱 iOS (IPA)</text>
  <text x="110" y="333" text-anchor="middle" class="detail">🖥️ Win/Mac/Linux</text>
  <text x="110" y="348" text-anchor="middle" class="detail">💻 Web (Browser)</text>

  <!-- Arrows -->
  <line x1="190" y1="310" x2="248" y2="310" stroke="#00E676" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="450" y1="110" x2="450" y2="128" stroke="#00BCD4" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="450" y1="190" x2="450" y2="218" stroke="#00BCD4" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="650" y1="285" x2="708" y2="285" stroke="#FF8F00" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a)"/>

  <!-- Arrows from CDN -->
  <line x1="110" y1="110" x2="110" y2="128" stroke="#00E676" stroke-width="1" marker-end="url(#a)"/>
  <line x1="110" y1="190" x2="110" y2="258" stroke="#00E676" stroke-width="1" marker-end="url(#a)"/>

  <!-- Legend -->
  <rect x="30" y="430" width="840" height="55" rx="10" fill="#111111" stroke="rgba(0,230,118,0.08)" stroke-width="1"/>
  <text x="450" y="453" text-anchor="middle" class="label">Tecnologías de Despliegue</text>
  <text x="110" y="472" text-anchor="middle" class="detail" fill="#00BCD4">Docker + Kubernetes</text>
  <text x="260" y="472" text-anchor="middle" class="detail" fill="#00E676">GitHub Actions CI/CD</text>
  <text x="420" y="472" text-anchor="middle" class="detail" fill="#42A5F5">AWS / DigitalOcean</text>
  <text x="570" y="472" text-anchor="middle" class="detail" fill="#FF8F00">Raspberry Pi OS 64-bit</text>
  <text x="740" y="472" text-anchor="middle" class="detail" fill="#AB47BC">TLS 1.3 + HTTPS</text>
</svg>
