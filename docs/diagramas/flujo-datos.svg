<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <style>
    text { font-family: 'Segoe UI', system-ui, sans-serif; }
    .title { font-size: 16px; font-weight: 700; fill: #E0E0E0; }
    .step { font-size: 11px; fill: #E0E0E0; font-weight: 600; }
    .detail { font-size: 9px; fill: #78909C; }
    .num { font-size: 20px; font-weight: 700; }
  </style>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00E676"/>
    </marker>
    <marker id="ac" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00BCD4"/>
    </marker>
  </defs>

  <rect width="1000" height="600" fill="#060E09"/>

  <text x="500" y="30" text-anchor="middle" class="title">FLUJO DE DATOS END-TO-END — Lectura de Sensor</text>

  <!-- Step 1: Sensor -->
  <rect x="30" y="70" width="150" height="120" rx="12" fill="#1A1A0A" stroke="rgba(255,82,82,0.3)" stroke-width="1"/>
  <text x="105" y="92" text-anchor="middle" class="num" fill="#FF5252">①</text>
  <text x="105" y="110" text-anchor="middle" class="step">SENSOR</text>
  <text x="105" y="128" text-anchor="middle" class="detail">Señal analógica /</text>
  <text x="105" y="142" text-anchor="middle" class="detail">protocolo digital</text>
  <text x="105" y="160" text-anchor="middle" class="detail">1-Wire · GPIO · I2C</text>
  <text x="105" y="174" text-anchor="middle" class="detail">ADC · UART</text>

  <!-- Arrow 1→2 -->
  <line x1="180" y1="130" x2="220" y2="130" stroke="#00E676" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 2: HAL -->
  <rect x="222" y="70" width="150" height="120" rx="12" fill="#0D2818" stroke="rgba(0,230,118,0.2)" stroke-width="1"/>
  <text x="297" y="92" text-anchor="middle" class="num" fill="#00E676">②</text>
  <text x="297" y="110" text-anchor="middle" class="step">HAL + DRIVER</text>
  <text x="297" y="128" text-anchor="middle" class="detail">Hardware Abstraction</text>
  <text x="297" y="142" text-anchor="middle" class="detail">Layer. Lectura cruda</text>
  <text x="297" y="160" text-anchor="middle" class="detail">→ Valor calibrado</text>
  <text x="297" y="174" text-anchor="middle" class="detail">Python drivers</text>

  <!-- Arrow 2→3 -->
  <line x1="372" y1="130" x2="412" y2="130" stroke="#00E676" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 3: Sensor Manager -->
  <rect x="414" y="70" width="150" height="120" rx="12" fill="#0D2818" stroke="rgba(0,230,118,0.2)" stroke-width="1"/>
  <text x="489" y="92" text-anchor="middle" class="num" fill="#00E676">③</text>
  <text x="489" y="110" text-anchor="middle" class="step">SENSOR MANAGER</text>
  <text x="489" y="128" text-anchor="middle" class="detail">Polling periódico</text>
  <text x="489" y="142" text-anchor="middle" class="detail">(60s configurable)</text>
  <text x="489" y="160" text-anchor="middle" class="detail">Orquesta lecturas</text>
  <text x="489" y="174" text-anchor="middle" class="detail">de todos los sensores</text>

  <!-- Arrow 3→4 (split) -->
  <line x1="564" y1="110" x2="630" y2="80" stroke="#FFD54F" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="564" y1="130" x2="630" y2="130" stroke="#00E676" stroke-width="2" marker-end="url(#a)"/>
  <line x1="564" y1="155" x2="630" y2="185" stroke="#00BCD4" stroke-width="1.5" marker-end="url(#ac)"/>

  <!-- Step 4a: SQLite -->
  <rect x="632" y="50" width="140" height="55" rx="8" fill="#1A2E1F" stroke="rgba(255,213,79,0.3)" stroke-width="1"/>
  <text x="702" y="72" text-anchor="middle" class="step" fill="#FFD54F">SQLite Cache</text>
  <text x="702" y="90" text-anchor="middle" class="detail">Almacén local offline</text>

  <!-- Step 4b: Alert Engine -->
  <rect x="632" y="112" width="140" height="55" rx="8" fill="#1A2E1F" stroke="rgba(0,230,118,0.3)" stroke-width="1"/>
  <text x="702" y="134" text-anchor="middle" class="step" fill="#00E676">Alert Engine</text>
  <text x="702" y="152" text-anchor="middle" class="detail">Evaluación local reglas</text>

  <!-- Step 4c: MQTT -->
  <rect x="632" y="175" width="140" height="55" rx="8" fill="#1A2E1F" stroke="rgba(0,188,212,0.3)" stroke-width="1"/>
  <text x="702" y="197" text-anchor="middle" class="step" fill="#00BCD4">MQTT Publish</text>
  <text x="702" y="215" text-anchor="middle" class="detail">Publicación local</text>

  <!-- Arrow 4→5 (Cloud Sync) -->
  <line x1="772" y1="77" x2="830" y2="130" stroke="#FFD54F" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 5: Cloud Sync -->
  <rect x="632" y="260" width="340" height="55" rx="12" fill="#0D2818" stroke="rgba(0,230,118,0.3)" stroke-width="1"/>
  <text x="802" y="278" text-anchor="middle" class="num" fill="#00E676">④</text>
  <text x="802" y="296" text-anchor="middle" class="step">CLOUD SYNC — Batch cada 5 min + reintentos exponenciales</text>

  <!-- Arrow 5→6 -->
  <line x1="802" y1="315" x2="802" y2="345" stroke="#00BCD4" stroke-width="2" marker-end="url(#ac)"/>

  <!-- Step 6: Backend -->
  <rect x="30" y="345" width="940" height="80" rx="12" fill="#0A1E30" stroke="rgba(0,188,212,0.2)" stroke-width="1"/>
  <text x="500" y="370" text-anchor="middle" class="num" fill="#00BCD4">⑤</text>
  <text x="500" y="390" text-anchor="middle" class="step">BACKEND CLOUD — FastAPI</text>

  <rect x="50" y="395" width="120" height="20" rx="4" fill="#0D1E30"/>
  <text x="110" y="410" text-anchor="middle" class="detail" fill="#42A5F5">PostgreSQL</text>

  <rect x="180" y="395" width="120" height="20" rx="4" fill="#0D1E30"/>
  <text x="240" y="410" text-anchor="middle" class="detail" fill="#AB47BC">InfluxDB</text>

  <rect x="310" y="395" width="120" height="20" rx="4" fill="#0D1E30"/>
  <text x="370" y="410" text-anchor="middle" class="detail" fill="#FF5252">Redis</text>

  <rect x="440" y="395" width="120" height="20" rx="4" fill="#0D1E30"/>
  <text x="500" y="410" text-anchor="middle" class="detail" fill="#FF8F00">Alert Worker</text>

  <rect x="570" y="395" width="120" height="20" rx="4" fill="#0D1E30"/>
  <text x="630" y="410" text-anchor="middle" class="detail" fill="#FF8F00">Report Worker</text>

  <rect x="700" y="395" width="120" height="20" rx="4" fill="#0D1E30"/>
  <text x="760" y="410" text-anchor="middle" class="detail" fill="#00BCD4">WebSocket</text>

  <rect x="830" y="395" width="120" height="20" rx="4" fill="#0D1E30"/>
  <text x="890" y="410" text-anchor="middle" class="detail" fill="#00E676">Notificaciones</text>

  <!-- Arrow 6→7 -->
  <line x1="500" y1="425" x2="500" y2="460" stroke="#00E676" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 7: Clients -->
  <rect x="30" y="462" width="940" height="70" rx="12" fill="#0D2818" stroke="rgba(0,230,118,0.15)" stroke-width="1"/>
  <text x="500" y="487" text-anchor="middle" class="num" fill="#00E676">⑥</text>
  <text x="500" y="505" text-anchor="middle" class="step">CLIENTES — Actualización en tiempo real vía WebSocket + REST API</text>

  <rect x="55" y="520" width="100" height="18" rx="4" fill="#1A2E1F"/>
  <text x="105" y="533" text-anchor="middle" class="detail" fill="#00E676">Web React</text>

  <rect x="170" y="520" width="100" height="18" rx="4" fill="#1A2E1F"/>
  <text x="220" y="533" text-anchor="middle" class="detail" fill="#00BCD4">Android</text>

  <rect x="285" y="520" width="100" height="18" rx="4" fill="#1A2E1F"/>
  <text x="335" y="533" text-anchor="middle" class="detail" fill="#00BCD4">iOS</text>

  <rect x="400" y="520" width="100" height="18" rx="4" fill="#1A2E1F"/>
  <text x="450" y="533" text-anchor="middle" class="detail" fill="#AB47BC">Windows</text>

  <rect x="515" y="520" width="100" height="18" rx="4" fill="#1A2E1F"/>
  <text x="565" y="533" text-anchor="middle" class="detail" fill="#AB47BC">macOS</text>

  <rect x="630" y="520" width="100" height="18" rx="4" fill="#1A2E1F"/>
  <text x="680" y="533" text-anchor="middle" class="detail" fill="#AB47BC">Linux</text>

  <rect x="745" y="520" width="100" height="18" rx="4" fill="#1A2E1F"/>
  <text x="795" y="533" text-anchor="middle" class="detail" fill="#FF8F00">Admin Panel</text>

  <!-- Footer -->
  <text x="500" y="575" text-anchor="middle" class="detail">EchoSmart — Flujo completo: Sensor → HAL → Manager → Cache/Alert/MQTT → Cloud Sync → Backend → Clientes</text>
</svg>
